ai_instruction_targets:
  - path: "{{ ansible_facts.env.HOME }}/.claude/CLAUDE.md"
    dir: "{{ ansible_facts.env.HOME }}/.claude"
    dir_mode: '0700'
  - path: "{{ ansible_facts.env.HOME }}/.codex/AGENTS.md"
    dir: "{{ ansible_facts.env.HOME }}/.codex"
    dir_mode: '0755'
  - path: "{{ ansible_facts.env.HOME }}/.gemini/AGENTS.md"
    dir: "{{ ansible_facts.env.HOME }}/.gemini"
    dir_mode: '0755'

ai_claude_effort_level: high
ai_claude_default_mode: auto
ai_claude_skip_auto_permission_prompt: true

ai_claude_env:
  CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"

ai_claude_plugin_marketplaces:
  - name: openai-codex
    source: openai/codex-plugin-cc

ai_claude_plugins:
  - name: frontend-design
    marketplace: claude-plugins-official
  - name: codex
    marketplace: openai-codex

ai_mcp_servers:
  - name: context7
    command: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
  - name: jetbrains
    url: "http://localhost:64342/sse"
  - name: terraform
    command: docker
    args: ["run", "-i", "--rm", "hashicorp/terraform-mcp-server"]
  - name: firecrawl
    command: npx
    args: ["-y", "firecrawl-mcp"]
    env:
      FIRECRAWL_API_KEY: "{{ firecrawl_api_key }}"
