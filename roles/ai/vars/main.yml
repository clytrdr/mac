ai_instruction_targets:
  - path: "{{ ansible_facts.env.HOME }}/.claude/CLAUDE.md"
    dir: "{{ ansible_facts.env.HOME }}/.claude"
    dir_mode: '0700'
  - path: "{{ ansible_facts.env.HOME }}/.codex/AGENTS.md"
    dir: "{{ ansible_facts.env.HOME }}/.codex"
    dir_mode: '0755'
  - path: "{{ ansible_facts.env.HOME }}/.gemini/GEMINI.md"
    dir: "{{ ansible_facts.env.HOME }}/.gemini"
    dir_mode: '0755'

# Seed values for a machine without settings.json. Once settings.json
# has model / effortLevel (set via /model and /effort), those win.
ai_claude_model: claude-opus-4-8[1m]
ai_claude_effort_level: xhigh
ai_claude_default_mode: auto
ai_claude_skip_auto_permission_prompt: true

# Status line: show the active model, plus the effort level when set.
# Folded so no source line exceeds the yaml[line-length] limit; the folding
# joins these lines back into a single shell command with spaces.
ai_claude_status_line_command: >-
  input=$(cat);
  model=$(echo "$input" | jq -r '.model.display_name');
  effort=$(echo "$input" | jq -r '.effort.level // empty');
  if [ -n "$effort" ]; then printf '%s (%s)' "$model" "$effort";
  else printf '%s' "$model"; fi

ai_codex_trusted_projects:
  - "{{ ansible_facts.env.HOME }}/Code"
  - "{{ ansible_facts.env.HOME }}/Documents"
  - "{{ ansible_facts.env.HOME }}/Code/back"
  - "{{ ansible_facts.env.HOME }}/Code/mac"

ai_codex_tui_model_nux:
  "gpt-5.5": 3

ai_codex_skills_excludes:
  - reviewbycodex

ai_antigravity_skills_excludes: []

ai_antigravity_model: "Gemini 3.6 Flash (High)"

ai_antigravity_trusted_workspaces:
  - "{{ ansible_facts.env.HOME }}/Code"
  - "{{ ansible_facts.env.HOME }}/Code/core"
  - "{{ ansible_facts.env.HOME }}/Code/back"
  - "{{ ansible_facts.env.HOME }}/Code/mac"

ai_claude_env:
  CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"

ai_claude_plugin_marketplaces:
  - name: openai-codex
    source: openai/codex-plugin-cc

ai_claude_plugins:
  - name: frontend-design
    marketplace: claude-plugins-official
  - name: codex
    marketplace: openai-codex

ai_mcp_servers:
  - name: context7
    command: npx
    args: ["-y", "@upstash/context7-mcp@latest"]
  # PyCharm serves its built-in MCP server on the streamable HTTP endpoint
  # /stream. The IDE assigns the port, so it can change after an IDE update.
  # Read the current value from Settings > Tools > MCP Server.
  - name: pycharm
    url: "http://127.0.0.1:64462/stream"
  - name: terraform
    command: docker
    args: ["run", "-i", "--rm", "hashicorp/terraform-mcp-server"]
  - name: firecrawl
    command: npx
    args: ["-y", "firecrawl-mcp"]
    env:
      FIRECRAWL_API_KEY: "{{ firecrawl_api_key }}"
