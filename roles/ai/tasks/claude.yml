- name: Check if Claude Code CLI is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/bin/claude"
  register: ai_claude_binary

- name: Create temp directory for Claude Code installer
  ansible.builtin.tempfile:
    state: directory
  register: ai_claude_installer_tmp
  when: not ai_claude_binary.stat.exists
  check_mode: false

- name: Download Claude Code installer
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: "{{ ai_claude_installer_tmp.path }}/install.sh"
    mode: '0700'
  when: not ai_claude_binary.stat.exists

- name: Run Claude Code installer
  ansible.builtin.command:
    cmd: bash {{ ai_claude_installer_tmp.path }}/install.sh
  when: not ai_claude_binary.stat.exists

- name: Remove Claude Code installer temp directory
  ansible.builtin.file:
    path: "{{ ai_claude_installer_tmp.path }}"
    state: absent
  when: not ai_claude_binary.stat.exists
  check_mode: false

# model and effortLevel change per session via /model and /effort.
# Read the live settings first so the template keeps their current
# values; the vars only seed a machine without settings.json.
- name: Read current Claude Code settings
  ansible.builtin.slurp:
    src: "{{ ansible_facts.env.HOME }}/.claude/settings.json"
  register: ai_claude_settings_current_raw
  failed_when: false

- name: Parse current Claude Code settings
  ansible.builtin.set_fact:
    ai_claude_settings_current: >-
      {{ (ai_claude_settings_current_raw.content | b64decode | from_json)
         if ai_claude_settings_current_raw.content is defined else {} }}

- name: Configure Claude Code settings
  ansible.builtin.template:
    src: templates/claude_settings.j2
    dest: "{{ ansible_facts.env.HOME }}/.claude/settings.json"
    mode: '0600'

- name: Ensure Claude Code skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.claude/skills"
    state: directory
    mode: '0755'

- name: Deploy custom skills
  ansible.builtin.copy:
    src: files/skills/
    dest: "{{ ansible_facts.env.HOME }}/.claude/skills/"
    mode: '0644'
    directory_mode: '0755'

- name: Check if Claude Code CLI is available
  ansible.builtin.command:
    cmd: which claude
  register: ai_claude_cli_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: List configured MCP servers
  ansible.builtin.command:
    cmd: claude mcp list
  register: ai_claude_mcp_list
  changed_when: false
  check_mode: false
  when: ai_claude_cli_check.rc == 0

- name: Add MCP servers (stdio)
  ansible.builtin.command:
    cmd: >-
      claude mcp add --scope user
      {{ item.name }}
      {% for k, v in (item.env | default({})).items() %}-e {{ k }}={{ v }} {% endfor %}
      -- {{ item.command }} {{ item.args | join(' ') }}
  loop: "{{ ai_mcp_servers | selectattr('command', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - ai_claude_cli_check.rc == 0
    - ai_claude_mcp_list.stdout_lines | select('match', '^' ~ item.name ~ ':') | list | length == 0
  changed_when: true
  no_log: true

- name: Add MCP servers (sse)
  ansible.builtin.command:
    cmd: >-
      claude mcp add --scope user --transport sse
      {{ item.name }} {{ item.url }}
  loop: "{{ ai_mcp_servers | selectattr('url', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - ai_claude_cli_check.rc == 0
    - ai_claude_mcp_list.stdout_lines | select('match', '^' ~ item.name ~ ':') | list | length == 0
  changed_when: true

- name: List configured plugin marketplaces
  ansible.builtin.command:
    cmd: claude plugin marketplace list --json
  register: ai_claude_marketplace_list
  changed_when: false
  check_mode: false
  when: ai_claude_cli_check.rc == 0

- name: Add Claude Code plugin marketplaces
  ansible.builtin.command:
    cmd: claude plugin marketplace add {{ item.source }}
  loop: "{{ ai_claude_plugin_marketplaces }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  when:
    - ai_claude_cli_check.rc == 0
    - >-
      ai_claude_marketplace_list.stdout | from_json
      | selectattr('name', 'equalto', item.name)
      | list | length == 0

- name: List installed plugins
  ansible.builtin.command:
    cmd: claude plugin list --json
  register: ai_claude_plugin_list
  changed_when: false
  check_mode: false
  when: ai_claude_cli_check.rc == 0

- name: Install Claude Code plugins
  ansible.builtin.command:
    cmd: claude plugin install {{ item.name }}@{{ item.marketplace }}
  loop: "{{ ai_claude_plugins }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  when:
    - ai_claude_cli_check.rc == 0
    - >-
      ai_claude_plugin_list.stdout | from_json
      | selectattr('id', 'equalto', item.name ~ '@' ~ item.marketplace)
      | list | length == 0

- name: Enable Claude Code plugins
  ansible.builtin.command:
    cmd: claude plugin enable {{ item.name }}@{{ item.marketplace }}
  loop: "{{ ai_claude_plugins }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  when:
    - ai_claude_cli_check.rc == 0
    - >-
      ai_claude_plugin_list.stdout | from_json
      | selectattr('id', 'equalto', item.name ~ '@' ~ item.marketplace)
      | selectattr('enabled', 'equalto', false) | list | length > 0
