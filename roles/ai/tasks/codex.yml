- name: Codex CLI install
  community.general.npm:
    name: '@openai/codex'
    state: present
    global: true

# diff is disabled because the rendered config contains API keys.
- name: Configure Codex CLI
  ansible.builtin.template:
    src: templates/codex_config.j2
    dest: "{{ ansible_facts.env.HOME }}/.codex/config.toml"
    mode: '0600'
  diff: false

- name: Ensure Codex CLI skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.codex/skills"
    state: directory
    mode: '0755'

# See the Claude Code skill deploy task for why synchronize is used here.
# rsync handles the excludes, so the skill directories no longer need to be
# listed first.
- name: Deploy custom Codex skills
  ansible.posix.synchronize:
    src: "{{ role_path }}/files/skills/"
    dest: "{{ ansible_facts.env.HOME }}/.codex/skills/"
    delete: true
    rsync_opts: "{{ ['--exclude=.*']
                    + (ai_codex_skills_excludes
                       | map('regex_replace', '^', '--exclude=') | list) }}"

# rsync never deletes an excluded path, so a skill that was deployed before
# it was added to ai_codex_skills_excludes has to be removed here.
- name: Remove excluded Codex skills
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.codex/skills/{{ item }}"
    state: absent
  loop: "{{ ai_codex_skills_excludes }}"
