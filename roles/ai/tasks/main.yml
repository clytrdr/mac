- name: Configure AI coding agents
  tags:
    - ai
  block:
    - name: Import common AI tasks
      ansible.builtin.import_tasks:
        file: common.yml
      tags: [always]

    - name: Import Claude Code tasks
      ansible.builtin.import_tasks:
        file: claude.yml
      tags: [claude]

    - name: Import Codex CLI tasks
      ansible.builtin.import_tasks:
        file: codex.yml
      tags: [codex]

    - name: Import Gemini CLI tasks
      ansible.builtin.import_tasks:
        file: gemini.yml
      tags: [gemini]
